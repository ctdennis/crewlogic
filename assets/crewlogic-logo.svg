  <text x="214" y="140" font-family="'DM Sans','Segoe UI',Arial,sans-serif" font-weight="700" font-size="18" letter-spacing="3.4" fill="#eaf1f8">OPTIMIZE&#160;&#160;<tspan fill="#39ED07">&#8226;</tspan>&#160;&#160;COORDINATE&#160;&#160;<tspan fill="#39ED07">&#8226;</tspan>&#160;&#160;SCALE</text>
